<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0f1e">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <title>Ninurta‑V2 · Secure Transfer</title>
    <style>
        body {
            background: #0a0f1e;
            font-family: system-ui;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            max-width: 550px;
            width: 100%;
            background: #111827cc;
            border-radius: 48px;
            padding: 24px;
            border: 1px solid #2d3a5e;
        }
        h1 { text-align: center; color: white; }
        .balance { background: #00000066; border-radius: 32px; padding: 16px; text-align: center; margin: 16px 0; }
        .balance .amount { font-size: 2rem; font-weight: bold; color: #ffdd99; }
        input, button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
        }
        input { background: #010a1a; border: 1px solid #2f4172; color: #ffdd99; }
        button { background: #3b6ea0; color: white; font-weight: bold; cursor: pointer; }
        .footer { font-size: 0.65rem; text-align: center; color: #5b6b8e; margin-top: 20px; }
    </style>
</head>
<body>
<div class="card">
    <h1>⚡ NINURTA‑V2</h1>
    <div class="balance">
        <div class="amount" id="balance">1,250.00</div>
        <div>≈ $1,250 USD</div>
    </div>
    <input type="text" id="recipient" placeholder="Recipient ID / Phone / Email">
    <input type="number" id="amount" placeholder="Amount (USD)">
    <button id="sendBtn">✈️ Send Payment</button>
    <div id="status" style="color:#88aaff; text-align:center; margin-top:12px;"></div>
    <div class="footer">🔐 PIN + SMS verification · Every transaction</div>
</div>
<script>
    document.getElementById('sendBtn').addEventListener('click', async () => {
        const recipient = document.getElementById('recipient').value;
        const amount = parseFloat(document.getElementById('amount').value);
        if (!recipient || isNaN(amount)) { alert('Enter recipient and amount'); return; }
        
        const pin = prompt("Enter your 4-digit PIN:");
        if (pin !== "1234") { alert("Invalid PIN"); return; }
        
        const smsCode = Math.floor(100000 + Math.random() * 900000);
        alert(`SMS sent. Code: ${smsCode}`);
        const userCode = prompt("Enter SMS code:");
        if (userCode != smsCode) { alert("Invalid SMS code"); return; }
        
        let balanceEl = document.getElementById('balance');
        let current = parseFloat(balanceEl.innerText);
        balanceEl.innerText = (current - amount).toFixed(2);
        document.getElementById('status').innerHTML = `✅ Sent $${amount} to ${recipient}`;
        setTimeout(() => document.getElementById('status').innerHTML = '', 3000);
    });
</script>
</body>
</html>
