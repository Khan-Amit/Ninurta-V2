<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0f1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Ninurta‑V2 · Multi‑Currency Transfer</title>
    <style>
        body {
            background: #0a0f1e;
            font-family: system-ui;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            max-width: 550px;
            width: 100%;
            background: #111827cc;
            border-radius: 48px;
            padding: 24px;
            border: 1px solid #2d3a5e;
        }
        h1 { text-align: center; color: white; margin: 0 0 8px; }
        .balance {
            background: #00000066;
            border-radius: 32px;
            padding: 16px;
            text-align: center;
            margin-bottom: 20px;
        }
        .balance .amount {
            font-size: 2rem;
            font-weight: bold;
            color: #ffdd99;
        }
        .currency-select {
            background: #010a1a;
            border: 1px solid #2f4172;
            color: #ffdd99;
            padding: 12px;
            border-radius: 40px;
            width: 100%;
            margin: 8px 0;
            font-size: 1rem;
        }
        input, button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
        }
        input { background: #010a1a; border: 1px solid #2f4172; color: #ffdd99; }
        button { background: #3b6ea0; color: white; font-weight: bold; cursor: pointer; }
        .footer { font-size: 0.65rem; text-align: center; color: #5b6b8e; margin-top: 20px; }
        #status { color: #88aaff; text-align: center; margin-top: 12px; }
    </style>
</head>
<body>
<div class="card">
    <h1>⚡ NINURTA‑V2</h1>
    <div class="balance">
        <div class="amount" id="balance">1,250.00</div>
        <div id="balanceCurrency">USD</div>
    </div>

    <select id="currency" class="currency-select">
        <option value="USD">💵 USD - US Dollar</option>
        <option value="EUR">💶 EUR - Euro</option>
        <option value="CNY">💴 CNY - Chinese Yuan</option>
        <option value="THB">฿ THB - Thai Baht</option>
        <option value="BDT">৳ BDT - Bangladeshi Taka</option>
        <option value="INR">₹ INR - Indian Rupee</option>
    </select>

    <input type="text" id="recipient" placeholder="Recipient ID / Phone / Email">
    <input type="number" id="amount" placeholder="Amount">
    <button id="sendBtn">✈️ Send Payment</button>
    <div id="status"></div>
    <div class="footer">🔐 PIN + SMS · Multi‑currency · No SWIFT</div>
</div>

<script>
    // Exchange rates (relative to USD – demo values, replace with real API)
    const rates = {
        USD: 1,
        EUR: 0.92,
        CNY: 7.22,
        THB: 36.5,
        BDT: 109.5,
        INR: 83.2
    };

    const symbols = {
        USD: '$', EUR: '€', CNY: '¥', THB: '฿', BDT: '৳', INR: '₹'
    };

    let currentCurrency = 'USD';
    let balanceUSD = 1250; // store balance in USD internally

    function updateDisplay() {
        const converted = (balanceUSD * rates[currentCurrency]).toFixed(2);
        document.getElementById('balance').innerText = converted;
        document.getElementById('balanceCurrency').innerText = currentCurrency;
    }

    document.getElementById('currency').addEventListener('change', (e) => {
        currentCurrency = e.target.value;
        updateDisplay();
    });

    document.getElementById('sendBtn').addEventListener('click', async () => {
        const recipient = document.getElementById('recipient').value;
        let amount = parseFloat(document.getElementById('amount').value);
        if (!recipient || isNaN(amount)) { alert('Enter recipient and amount'); return; }

        // Convert amount to USD for balance check
        const amountUSD = amount / rates[currentCurrency];
        if (amountUSD > balanceUSD) { alert('Insufficient balance'); return; }

        // PIN verification
        const pin = prompt("Enter your 4-digit PIN:");
        if (pin !== "1234") { alert("Invalid PIN"); return; }

        // SMS simulation
        const smsCode = Math.floor(100000 + Math.random() * 900000);
        alert(`SMS sent to your registered number. Code: ${smsCode}`);
        const userCode = prompt("Enter SMS code:");
        if (userCode != smsCode) { alert("Invalid SMS code"); return; }

        // Update balance
        balanceUSD -= amountUSD;
        updateDisplay();
        document.getElementById('status').innerHTML = `✅ Sent ${symbols[currentCurrency]}${amount.toFixed(2)} ${currentCurrency} to ${recipient}`;
        setTimeout(() => document.getElementById('status').innerHTML = '', 3000);
        document.getElementById('amount').value = '';
    });

    updateDisplay();
</script>
</body>
</html>
