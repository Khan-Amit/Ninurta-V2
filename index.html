<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ninurta‑V2 · Secure Wallet</title>
    <style>
        body {
            background: #0a0f1e;
            font-family: system-ui;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            max-width: 550px;
            width: 100%;
            background: #111827cc;
            border-radius: 48px;
            padding: 24px;
            border: 1px solid #2d3a5e;
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
        }
        input { background: #010a1a; border: 1px solid #2f4172; color: #ffdd99; }
        button { background: #3b6ea0; color: white; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        .footer { font-size: 0.7rem; color: #5b6b8e; margin-top: 20px; }
    </style>
</head>
<body>
<div class="card" id="loginDiv">
    <h2>🔐 Unlock Ninurta‑V2</h2>
    <input type="password" id="loginPin" placeholder="Enter 4-digit PIN" maxlength="4">
    <button id="unlockBtn">Unlock</button>
    <div class="footer">Secure wallet · Your keys, your coins</div>
</div>

<div class="card hidden" id="appDiv">
    <h1>⚡ NINURTA‑V2</h1>
    <div class="balance" id="balance">1,250.00</div>
    <select id="currency">
        <option value="USD">USD</option><option value="EUR">EUR</option>
        <option value="CNY">CNY</option><option value="THB">THB</option>
        <option value="BDT">BDT</option><option value="INR">INR</option>
    </select>
    <input type="text" id="recipient" placeholder="Recipient">
    <input type="number" id="amount" placeholder="Amount">
    <button id="sendBtn">✈️ Send</button>
    <button id="logoutBtn" style="background:#6b8cae;">🔒 Lock</button>
    <div id="status"></div>
</div>

<script>
    const CORRECT_PIN = "1234"; // Change this

    function showApp() {
        document.getElementById('loginDiv').classList.add('hidden');
        document.getElementById('appDiv').classList.remove('hidden');
    }

    function showLogin() {
        document.getElementById('loginDiv').classList.remove('hidden');
        document.getElementById('appDiv').classList.add('hidden');
        document.getElementById('loginPin').value = '';
    }

    document.getElementById('unlockBtn').addEventListener('click', () => {
        const pin = document.getElementById('loginPin').value;
        if (pin === CORRECT_PIN) showApp();
        else alert('Wrong PIN');
    });

    document.getElementById('logoutBtn').addEventListener('click', showLogin);

    // Reuse existing send logic (simplified)
    document.getElementById('sendBtn').addEventListener('click', () => {
        const recipient = document.getElementById('recipient').value;
        const amount = document.getElementById('amount').value;
        if (!recipient || !amount) { alert('Enter recipient and amount'); return; }
        alert(`✅ Sent ${amount} to ${recipient}`);
    });
</script>
</body>
</html>
